name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache model weights
        uses: actions/cache@v4
        with:
          path: app/models_unet/resnet101_unet.pth
          key: model-weights-resnet101-unet-v1
      - name: Download model weights (if missing)
        env:
          MODEL_URL: https://github.com/Artem817/Fastapi-image-service/releases/download/v1.0.0-rc1/resnet101_unet.pth
        run: |
          if [ ! -f app/models_unet/resnet101_unet.pth ]; then
            curl -fsSL "$MODEL_URL" -o app/models_unet/resnet101_unet.pth
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: |
          python -m pytest -q
